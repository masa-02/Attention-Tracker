model_info:
  provider: attn-hf-no-sys
  name: gemma-2-9b-it-attn
  model_id: google/gemma-2-9b-it
params:
  temperature: 0.1
  max_output_tokens: 32
  important_heads: []
runtime:
  dataset_name: deepset/prompt-injections
  seed: 0
  instruction: Say xxxxxx
  output_dir: result
audit:
  enabled: true
  run_id: gemma-2-9b-gate1
  audit_dir: null
  attention_summary: false   # set true to write full [L,H] attention arrays (attention_summary.npz)
head_selection:
  dataset: llm
  num_data: 30
  select_k: 4
  update_config: false
