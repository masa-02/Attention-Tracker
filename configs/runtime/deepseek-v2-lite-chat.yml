model_info:
  provider: attn-hf
  name: deepseek-v2-lite-chat-attn
  model_id: deepseek-ai/DeepSeek-V2-Lite-Chat
params:
  temperature: 0.1
  max_output_tokens: 32
  important_heads: []
runtime:
  dataset_name: deepset/prompt-injections
  seed: 0
  instruction: Say xxxxxx
  output_dir: result
audit:
  enabled: true
  run_id: deepseek-v2-lite-chat-phase1
  audit_dir: null
  attention_summary: false   # set true to write full [L,H] attention arrays (attention_summary.npz)
head_selection:
  dataset: llm
  num_data: 30
  select_k: 4
  update_config: false

phase2:
  enabled: false
  output_dir: outputs/phase2
  strict_spans: true

