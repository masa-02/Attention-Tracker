model_info:
  provider: attn-hf-no-sys
  name: qwen2.5-14b-attn
  model_id: Qwen/Qwen2.5-14B
model_loading:
  quantization: 8bit
  dtype: bfloat16
  device_map: auto
  low_cpu_mem_usage: true
  offload_state_dict: true
  use_safetensors: true
prompt:
  format: plain
  data_prefix: 'Data: '
  template: '{instruction}

    {prefixed_data}

    Answer:'
params:
  temperature: 0.1
  max_output_tokens: 32
  important_heads:
  - - 6
    - 18
  - - 12
    - 8
  - - 15
    - 31
  - - 24
    - 9
  - - 24
    - 14
  - - 24
    - 26
  - - 25
    - 17
  - - 25
    - 33
  - - 30
    - 25
runtime:
  dataset_name: deepset/prompt-injections
  seed: 0
  instruction: Say xxxxxx
  output_dir: result
audit:
  enabled: true
  run_id: qwen2.5-14b-phase1
  audit_dir: null
  attention_summary: false
head_selection:
  dataset: llm
  num_data: 30
  select_k: 4
  update_config: false
phase2:
  enabled: false
  output_dir: outputs/phase2
  strict_spans: true
