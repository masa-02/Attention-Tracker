model_info:
  provider: attn-hf
  name: qwen3.6-27b-attn
  model_id: Qwen/Qwen3.6-27B
model_loading:
  quantization: 4bit
  dtype: bfloat16
  compute_dtype: bfloat16
  device_map: auto
  quant_type: nf4
  double_quant: true
params:
  temperature: 0.1
  max_output_tokens: 32
  important_heads: []
runtime:
  dataset_name: deepset/prompt-injections
  seed: 0
  instruction: Say xxxxxx
  output_dir: result
audit:
  enabled: true
  run_id: qwen3.6-27b-phase1
  audit_dir: null
  attention_summary: false   # set true to write full [L,H] attention arrays (attention_summary.npz)
head_selection:
  dataset: llm
  num_data: 30
  select_k: 4
  update_config: false

phase2:
  enabled: false
  output_dir: outputs/phase2
  strict_spans: true

