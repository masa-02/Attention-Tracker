model_info:
  provider: attn-hf
  name: llama-3.1-8b-instruct-attn
  model_id: meta-llama/Llama-3.1-8B-Instruct
model_loading:
  quantization: 8bit
  dtype: bfloat16
  device_map: auto
params:
  temperature: 0.1
  max_output_tokens: 32
  important_heads:
  - - 2
    - 24
  - - 5
    - 18
  - - 8
    - 18
  - - 13
    - 23
  - - 17
    - 2
runtime:
  dataset_name: deepset/prompt-injections
  seed: 0
  instruction: Say xxxxxx
  output_dir: result
audit:
  enabled: true
  run_id: llama-3.1-8b-instruct-phase1
  audit_dir: null
  attention_summary: false   # set true to write full [L,H] attention arrays (attention_summary.npz)
head_selection:
  dataset: llm
  num_data: 30
  select_k: 4
  update_config: false

phase2:
  enabled: false
  output_dir: outputs/phase2
  strict_spans: true

